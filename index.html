<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AURUM - Client Initialization</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
  <style>
    .font-luxury { font-family: 'Cinzel', serif; }
    .font-body { font-family: 'Montserrat', sans-serif; }
  </style>
</head>
<body class="bg-[#060709] text-gray-200 min-h-screen font-body flex items-center justify-center relative overflow-hidden p-4">

  <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-yellow-600/5 rounded-full blur-[120px] pointer-events-none"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-yellow-600/5 rounded-full blur-[120px] pointer-events-none"></div>

  <div class="w-full max-w-md bg-gradient-to-b from-zinc-950 to-[#0c0e12] border border-yellow-600/10 rounded-2xl p-8 md:p-10 shadow-2xl relative z-10">
    
    <div class="text-center mb-10">
      <h1 class="font-luxury text-3xl md:text-4xl font-bold tracking-[0.25em] text-transparent bg-clip-text bg-gradient-to-r from-yellow-500 via-yellow-200 to-yellow-600 uppercase drop-shadow">
        AURUM
      </h1>
      <p class="text-[10px] text-yellow-500/60 uppercase tracking-[0.3em] mt-2 font-light">Elite Access Portal</p>
      <div class="w-12 h-[1px] bg-gradient-to-r from-transparent via-yellow-500/40 to-transparent mx-auto mt-5"></div>
    </div>

    <form onsubmit="initializeClientSession(event)" class="space-y-6">
      
      <div>
        <label for="email" class="block text-[10px] uppercase text-gray-400 tracking-widest mb-2 font-medium">Digital Coordinates (Email)</label>
        <input 
          type="email" 
          id="email" 
          required 
          placeholder="name@domain.com"
          class="w-full bg-black/50 border border-zinc-800 rounded-lg px-4 py-3.5 text-xs text-gray-200 placeholder-zinc-600 focus:outline-none focus:border-yellow-500/80 transition-all duration-300"
        >
      </div>

      <div class="pt-2">
        <button 
          type="submit" 
          class="w-full bg-gradient-to-r from-yellow-500 via-yellow-200 to-yellow-600 hover:from-yellow-400 hover:to-yellow-500 text-black font-bold uppercase tracking-[0.2em] text-xs py-4 rounded-lg transition-all duration-300 shadow-lg shadow-yellow-600/10 active:scale-[0.99]"
        >
          Initialize Access
        </button>
      </div>

    </form>

    <p class="font-luxury text-[9px] text-center text-zinc-600 tracking-widest uppercase mt-10 italic">
      Move with strength, wear with elegance.
    </p>

  </div>

  <div id="gold-loader" class="fixed inset-0 bg-[#060709] z-50 flex flex-col items-center justify-center hidden transition-all duration-500">
    <div class="relative flex items-center justify-center mb-4">
      <div class="w-16 h-16 border-2 border-transparent border-t-yellow-400 border-b-yellow-600 rounded-full animate-spin"></div>
      <div class="absolute w-3 h-3 bg-gradient-to-r from-yellow-400 to-yellow-600 rounded-full shadow-lg shadow-yellow-400/50"></div>
    </div>
    <span class="font-luxury text-xs tracking-[0.3em] text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-yellow-200 uppercase font-medium animate-pulse">
      Verifying Coordinates...
    </span>
  </div>

  <script src="app.js"></script>

</body>
</html>
